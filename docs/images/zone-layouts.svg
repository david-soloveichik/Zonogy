<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <style>
    text { font-family: -apple-system, 'Helvetica Neue', sans-serif; }
  </style>

  <!-- 1-Zone Layout -->
  <g transform="translate(0, 30)">
    <text x="110" y="-8" text-anchor="middle" fill="#888" font-size="13" font-weight="500">1 zone</text>
    <rect x="10" y="0" width="200" height="150" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
    <rect x="18" y="8" width="184" height="134" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="110" y="74" text-anchor="middle" fill="#4a9eff" font-size="11" opacity="0.6">empty zone</text>
    <text x="110" y="88" text-anchor="middle" fill="#4a9eff" font-size="11" opacity="0.6">(placeholder)</text>
    <rect x="65" y="3" width="90" height="4" rx="2" fill="#4a9eff" opacity="0.8"/>
  </g>

  <!-- 2-Zone Layout -->
  <g transform="translate(230, 30)">
    <text x="130" y="-8" text-anchor="middle" fill="#888" font-size="13" font-weight="500">2 zones</text>
    <rect x="10" y="0" width="240" height="150" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
    <!-- Zone 1 (left) -->
    <rect x="18" y="8" width="112" height="134" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="74" y="74" text-anchor="middle" fill="#4a9eff" font-size="11" opacity="0.6">empty zone</text>
    <text x="74" y="88" text-anchor="middle" fill="#4a9eff" font-size="11" opacity="0.6">(placeholder)</text>
    <!-- Zone 2 (right) - occupied -->
    <rect x="134" y="8" width="108" height="134" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="134" y="8" width="108" height="18" rx="5" fill="#333"/>
    <rect x="134" y="20" width="108" height="6" fill="#333"/>
    <circle cx="144" cy="17" r="3" fill="#ff5f57"/>
    <circle cx="153" cy="17" r="3" fill="#febc2e"/>
    <circle cx="162" cy="17" r="3" fill="#28c840"/>
    <text x="188" y="55" text-anchor="middle" fill="#777" font-size="9">window</text>
    <rect x="40" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.8"/>
    <rect x="155" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.2"/>
  </g>

  <!-- 3-Zone Layout -->
  <g transform="translate(500, 30)">
    <text x="130" y="-8" text-anchor="middle" fill="#888" font-size="13" font-weight="500">3 zones</text>
    <rect x="10" y="0" width="240" height="150" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
    <!-- Zone 1 (left) - occupied -->
    <rect x="18" y="8" width="112" height="134" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="18" y="8" width="112" height="18" rx="5" fill="#333"/>
    <rect x="18" y="20" width="112" height="6" fill="#333"/>
    <circle cx="28" cy="17" r="3" fill="#ff5f57"/>
    <circle cx="37" cy="17" r="3" fill="#febc2e"/>
    <circle cx="46" cy="17" r="3" fill="#28c840"/>
    <text x="74" y="55" text-anchor="middle" fill="#777" font-size="9">window</text>
    <!-- Zone 2 (right-top) - empty placeholder -->
    <rect x="134" y="8" width="108" height="63" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <text x="188" y="37" text-anchor="middle" fill="#4a9eff" font-size="10" opacity="0.6">empty zone</text>
    <text x="188" y="49" text-anchor="middle" fill="#4a9eff" font-size="10" opacity="0.6">(placeholder)</text>
    <!-- Zone 3 (right-bottom) - occupied -->
    <rect x="134" y="75" width="108" height="67" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="134" y="75" width="108" height="18" rx="5" fill="#333"/>
    <rect x="134" y="87" width="108" height="6" fill="#333"/>
    <circle cx="144" cy="84" r="3" fill="#ff5f57"/>
    <circle cx="153" cy="84" r="3" fill="#febc2e"/>
    <circle cx="162" cy="84" r="3" fill="#28c840"/>
    <text x="188" y="118" text-anchor="middle" fill="#777" font-size="9">window</text>
    <rect x="40" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.2"/>
    <rect x="155" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.8"/>

    <!-- Arrow: "targeted" pointing to bright indicator above Zone 2 -->
    <line x1="190" y1="-18" x2="190" y2="-2" stroke="#999" stroke-width="1"/>
    <polygon points="187,-2 190,2 193,-2" fill="#999"/>
    <text x="190" y="-22" text-anchor="middle" fill="#999" font-size="10">targeted</text>

  </g>

  <!-- 3-Zone + Temporary Zone Layout -->
  <g transform="translate(790, 30)">
    <text x="130" y="-8" text-anchor="middle" fill="#888" font-size="13" font-weight="500">3 zones + temporary</text>
    <rect x="10" y="0" width="240" height="150" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
    <!-- Zone 1 (left) - occupied -->
    <rect x="18" y="8" width="112" height="134" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="18" y="8" width="112" height="18" rx="5" fill="#333"/>
    <rect x="18" y="20" width="112" height="6" fill="#333"/>
    <circle cx="28" cy="17" r="3" fill="#ff5f57"/>
    <circle cx="37" cy="17" r="3" fill="#febc2e"/>
    <circle cx="46" cy="17" r="3" fill="#28c840"/>
    <!-- Zone 2 (right-top) - occupied -->
    <rect x="134" y="8" width="108" height="63" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="134" y="8" width="108" height="18" rx="5" fill="#333"/>
    <rect x="134" y="20" width="108" height="6" fill="#333"/>
    <circle cx="144" cy="17" r="3" fill="#ff5f57"/>
    <circle cx="153" cy="17" r="3" fill="#febc2e"/>
    <circle cx="162" cy="17" r="3" fill="#28c840"/>
    <!-- Zone 3 (right-bottom) - occupied -->
    <rect x="134" y="75" width="108" height="67" rx="5" fill="#252530" stroke="#555" stroke-width="1"/>
    <rect x="134" y="75" width="108" height="18" rx="5" fill="#333"/>
    <rect x="134" y="87" width="108" height="6" fill="#333"/>
    <circle cx="144" cy="84" r="3" fill="#ff5f57"/>
    <circle cx="153" cy="84" r="3" fill="#febc2e"/>
    <circle cx="162" cy="84" r="3" fill="#28c840"/>
    <!-- Target indicators (all dim — temporary zone is targeted) -->
    <rect x="40" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.2"/>
    <rect x="155" y="3" width="70" height="4" rx="2" fill="#4a9eff" opacity="0.2"/>

    <!-- Temporary zone window (floating, centered, with slight shadow) -->
    <rect x="58" y="32" width="144" height="100" rx="6" fill="#1a1a1a" stroke="#4a9eff" stroke-width="1.5" opacity="0.15"/>
    <rect x="55" y="30" width="144" height="100" rx="6" fill="#2a2a35" stroke="#4a9eff" stroke-width="1.5"/>
    <rect x="55" y="30" width="144" height="18" rx="6" fill="#383840"/>
    <rect x="55" y="42" width="144" height="6" fill="#383840"/>
    <circle cx="65" cy="39" r="3" fill="#ff5f57"/>
    <circle cx="74" cy="39" r="3" fill="#febc2e"/>
    <circle cx="83" cy="39" r="3" fill="#28c840"/>
    <text x="127" y="78" text-anchor="middle" fill="#888" font-size="9">floating window</text>

    <!-- Arrow: "temporary zone" pointing to the floating window -->
    <line x1="253" y1="78" x2="202" y2="78" stroke="#999" stroke-width="1"/>
    <polygon points="202,75 198,78 202,81" fill="#999"/>
    <text x="256" y="75" fill="#999" font-size="10" text-anchor="start">temporary</text>
    <text x="256" y="86" fill="#999" font-size="10" text-anchor="start">zone</text>
  </g>
</svg>
